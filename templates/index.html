<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu Amor ❤️</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Ajuste extra para o Iframe do YouTube ficar responsivo */
        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* Proporção 9:16 para Shorts (Vertical) */
            height: 0;
            overflow: hidden;
            max-width: 350px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(216, 27, 96, 0.4);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop>
        <source src="{{ url_for('static', filename='musica.mp3') }}" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <button id="start-btn">Toque aqui para ver sua surpresa ❤️</button>
    </div>

    <div id="text-container" class="pixel-text" style="display: none;"></div>

    <div id="video-container" style="display: none;">
        <div class="video-wrapper">
            <iframe 
                id="player-youtube"
                src="https://www.youtube.com/embed/ar146ORwQYA?enablejsapi=1&rel=0&showinfo=0&autoplay=0" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
        <button id="next-btn" style="margin-top: 20px; font-family: 'Press Start 2P'; font-size: 10px; padding: 10px; cursor: pointer;">Clique aqui após o vídeo ❤️</button>
    </div>

    <div id="final-message" class="pixel-text" style="display: none;">
        Bom, essa foi a surpresa...<br><br>
        Espero que você tenha gostado meu xuxu.<br><br>
        Te amo infinitamente!<br><br>
        <span class="simbolos">∞ ❤️</span>
    </div>

    <script>
        // Configurações
        const mensagem = "Meu amor, este site foi dedicado a você, a mulher mais incrível do mundo que eu tive o privilégio de estar ao lado e, principalmente, poder compartilhar minha vida maluca e tirar alguns risos. Nossa relação vale mais que mil beijos e abraços, pois estar ao seu lado significa querer crescer como pessoa e sempre torcer pelas suas conquistas. Como eu já havia falado antes, é um crime falarem que são apenas 7 maravilhas do mundo, sendo que todo dia, nem que seja por 5 minutos, eu consigo conversar e rir com a oitava maravilha do mundo! Eu te amo muito, meu amor! <3";

        const startOverlay = document.getElementById("start-overlay");
        const startBtn = document.getElementById("start-btn");
        const textContainer = document.getElementById("text-container");
        const videoContainer = document.getElementById("video-container");
        const finalMessage = document.getElementById("final-message");
        const nextBtn = document.getElementById("next-btn");
        const audio = document.getElementById("musica-fundo");
        const iframe = document.getElementById("player-youtube");

        let i = 0;
        const speed = 60; // Velocidade da digitação

        // Iniciar Surpresa
        startBtn.addEventListener("click", () => {
            startOverlay.style.display = "none";
            textContainer.style.display = "block";
            
            // Inicia música no minuto 1:04 (64 segundos)
            audio.currentTime = 64; 
            audio.play();
            
            typeWriter();
        });

        // Função de Digitação
        function typeWriter() {
            if (i < mensagem.length) {
                textContainer.innerHTML += mensagem.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Terminou o texto, espera 7 segundos e mostra o vídeo
                setTimeout(() => {
                    textContainer.style.display = "none";
                    videoContainer.style.display = "block";
                    
                    // Pausa a música para ela ouvir o som do vídeo
                    audio.pause();
                    
                    // Tenta dar play no YouTube (alguns browsers bloqueiam, ela pode ter de carregar no play do vídeo)
                    iframe.src += "&autoplay=1";
                }, 7000);
            }
        }

        // Finalizar e mostrar mensagem de amor
        nextBtn.addEventListener("click", () => {
            videoContainer.style.display = "none";
            finalMessage.style.display = "block";
            
            // Volta a música em loop
            audio.play();
        });
    </script>
</body>
</html>
