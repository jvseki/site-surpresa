<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu Amor ❤️</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%;
            height: 0;
            overflow: hidden;
            max-width: 350px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(216, 27, 96, 0.4);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop>
        <source src="{{ url_for('static', filename='musica.mp3') }}" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <button id="start-btn">Toque aqui para ver sua surpresa ❤️</button>
    </div>

    <div id="text-container" class="pixel-text" style="display: none;"></div>

    <div id="video-container" style="display: none;">
        <div class="video-wrapper">
            <iframe 
                id="player-youtube"
                src="https://www.youtube.com/embed/ar146ORwQYA" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
        <button id="next-btn" class="estilo-botao" style="margin-top: 20px;">Clique aqui após o vídeo ❤️</button>
    </div>

    <div id="final-message" class="pixel-text" style="display: none;">
        Bom, essa foi a surpresa...<br><br>
        Espero que você tenha gostado meu xuxu.<br><br>
        Te amo infinitamente!<br><br>
        <span class="simbolos">∞ ❤️</span>
    </div>

    <script>
        const mensagem = "Meu amor, este site foi dedicado a você, a mulher mais incrível do mundo que eu tive o privilégio de estar ao lado e, principalmente, poder compartilhar minha vida maluca e tirar alguns risos. Nossa relação vale mais que mil beijos e abraços, pois estar ao seu lado significa querer crescer como pessoa e sempre torcer pelas suas conquistas. Como eu já havia falado antes, é um crime falarem que são apenas 7 maravilhas do mundo, sendo que todo dia, nem que seja por 5 minutos, eu consigo conversar e rir com a oitava maravilha do mundo! Eu te amo muito, meu amor! <3";

        const startOverlay = document.getElementById("start-overlay");
        const startBtn = document.getElementById("start-btn");
        const textContainer = document.getElementById("text-container");
        const videoContainer = document.getElementById("video-container");
        const finalMessage = document.getElementById("final-message");
        const nextBtn = document.getElementById("next-btn");
        const audio = document.getElementById("musica-fundo");

     
        const btnPular = document.createElement("button");
        btnPular.innerText = "Ver a parte especial ❤️";
        btnPular.className = "estilo-botao";
        btnPular.style.display = "block";
        btnPular.style.margin = "20px auto";

        let i = 0;
        const speed = 60;

        startBtn.addEventListener("click", () => {
            startOverlay.style.display = "none";
            textContainer.style.display = "block";
            audio.currentTime = 64; 
            audio.play();
            typeWriter();
        });

        function typeWriter() {
            if (i < mensagem.length) {
                textContainer.innerHTML += mensagem.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                textContainer.appendChild(btnPular);
            }
        }

        btnPular.addEventListener("click", () => {
            textContainer.style.display = "none";
            videoContainer.style.display = "block";
            audio.pause();
        });

        nextBtn.addEventListener("click", () => {
            videoContainer.style.display = "none";
            finalMessage.style.display = "block";
            audio.play();
        });
    </script>
</body>
</html>
